name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Two caches are populated by the `setup` job and consumed by
# `frontend` / `backend`. Cache paths are RELATIVE TO THE REPO ROOT,
# not relative to any working-directory override.
jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (make setup)
        run: make setup

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('backend/requirements-dev.txt', 'backend/requirements-lint.txt') }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            node_modules
          key: combined-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            venv-${{ runner.os }}-
            node-${{ runner.os }}-

      - name: Re-install (cache miss)
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: make setup

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (pytest, matrix)
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            node_modules
          key: combined-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            venv-${{ runner.os }}-
            node-${{ runner.os }}-

      - name: Re-install backend deps (cache miss)
        if: steps.restore-cache.outputs.cache-hit != 'true'
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt
          .venv/bin/pip install -r requirements-lint.txt

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-lint.txt

      - name: Run pytest
        run: pytest -q

      - name: Ruff lint
        run: ruff check .

      - name: Worker smoke test
        run: python worker.py --once

  e2e:
    name: End-to-end smoke (boots backend, runs Node smoke, tears down)
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install
        run: make setup

      - name: Run make e2e
        run: bash scripts/e2e.sh
