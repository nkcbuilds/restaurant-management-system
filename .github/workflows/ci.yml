name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Each job is self-contained. There is no cross-job cache passing,
# which means no portability issues with Python-version-specific
# virtualenvs. Pip and npm dependencies are still cached by their
# respective setup-* actions based on the lockfile/requirements files.
#
# Path conventions: cache-dependency-path and paths in this file are
# RELATIVE TO THE REPO ROOT. The runner's default working directory is
# the repo root (the directory containing Makefile, package.json, etc.).
#
# Node: 22 LTS (Node 20 is being deprecated on Actions runners;
# 24 is the default but newer than our local development).

jobs:
  frontend:
    name: Frontend (format, typecheck, lint, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (pytest, ruff, worker smoke) — ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend + lint deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-lint.txt

      - name: Run pytest
        run: pytest -q

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Worker smoke test
        run: python worker.py --once

  e2e:
    name: End-to-end smoke (boots backend, runs Node smoke, tears down)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend deps
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements-dev.txt

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps

      - name: Run make e2e
        run: bash scripts/e2e.sh
