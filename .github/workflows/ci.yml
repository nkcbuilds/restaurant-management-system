name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: restaurant-management-system
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: restaurant-management-system/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: restaurant-management-system/backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: restaurant-management-system/backend/requirements-dev.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

      - name: Worker smoke test
        run: python worker.py --once

  smoke:
    name: End-to-end smoke (backend + node script)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend]
    defaults:
      run:
        working-directory: restaurant-management-system
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: restaurant-management-system/backend/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: restaurant-management-system/package-lock.json

      - name: Install backend deps
        working-directory: restaurant-management-system/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Start backend
        working-directory: restaurant-management-system/backend
        run: |
          rm -f restaurant.db
          python run.py &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          # Wait until /api/health responds (max ~30s).
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/api/health >/dev/null 2>&1; then
              echo "backend up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Smoke test
        run: node scripts/e2e-smoke.cjs

      - name: Stop backend
        if: always()
        run: |
          if [ -n "${BACKEND_PID:-}" ]; then
            kill "$BACKEND_PID" || true
          fi
